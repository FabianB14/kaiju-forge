name: Deploy to GitHub Pages

# This repo serves Pages from the gh-pages branch (creating that branch is
# what enabled Pages automatically — the workflow token here isn't allowed
# to create a Pages site via the API). Every push to main mirrors the tree
# into gh-pages, and GitHub's own "pages build and deployment" publishes it.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Mirror main to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git push -f origin gh-pages
